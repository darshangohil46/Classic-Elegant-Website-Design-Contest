<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 180" role="img" aria-label="Cartoon spy mascot examining a file with a magnifying glass">
  <title>chess-intelligence mascot — examining a dossier</title>

  <!-- ground file -->
  <g transform="rotate(-4 70 150)">
    <rect x="34" y="132" width="72" height="36" rx="4" fill="#f1ede3" stroke="#14161c" stroke-width="2.5"/>
    <line x1="44" y1="144" x2="92" y2="144" stroke="#a8adb8" stroke-width="3" stroke-linecap="round"/>
    <line x1="44" y1="153" x2="80" y2="153" stroke="#a8adb8" stroke-width="3" stroke-linecap="round"/>
    <line x1="44" y1="162" x2="86" y2="162" stroke="#a8adb8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- coat, leaning forward -->
  <g transform="rotate(8 130 120)">
    <polygon points="92,180 168,180 176,108 84,108" fill="#14161c"/>
    <circle cx="130" cy="146" r="4" fill="#c8852a"/>
  </g>

  <!-- back arm -->
  <path d="M168,124 C182,112 184,96 174,84" fill="none" stroke="#14161c" stroke-width="15" stroke-linecap="round"/>

  <!-- front arm extending the magnifying glass toward the file -->
  <path d="M94,128 C70,118 56,124 46,140" fill="none" stroke="#14161c" stroke-width="15" stroke-linecap="round"/>

  <!-- head -->
  <circle cx="142" cy="78" r="30" fill="#faf8f3" stroke="#14161c" stroke-width="3"/>
  <circle cx="132" cy="78" r="3" fill="#14161c"/>
  <path d="M148,68 Q158,72 152,80" fill="none" stroke="#14161c" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M132,92 Q142,98 152,90" fill="none" stroke="#14161c" stroke-width="3" stroke-linecap="round"/>

  <!-- fedora -->
  <g transform="rotate(-6 142 44)">
    <rect x="118" y="22" width="48" height="30" rx="13" fill="#14161c"/>
    <ellipse cx="142" cy="48" rx="42" ry="8" fill="#14161c"/>
    <rect x="118" y="40" width="48" height="6" fill="#c8852a"/>
  </g>

  <!-- magnifying glass -->
  <g>
    <circle cx="42" cy="132" r="16" fill="none" stroke="#c8852a" stroke-width="5"/>
    <line x1="53" y1="143" x2="64" y2="154" stroke="#14161c" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
