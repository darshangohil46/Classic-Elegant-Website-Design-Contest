<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Cartoon spy mascot peering through binoculars">
  <title>chess-intelligence mascot — investigating</title>

  <!-- coat -->
  <polygon points="58,220 142,220 152,142 48,142" fill="#14161c"/>
  <!-- collar -->
  <polygon points="86,142 100,160 114,142" fill="#faf8f3"/>
  <!-- lapel button -->
  <circle cx="100" cy="178" r="4" fill="#c8852a"/>

  <!-- arms reaching up to binoculars -->
  <path d="M62,150 C50,128 56,104 78,92" fill="none" stroke="#14161c" stroke-width="16" stroke-linecap="round"/>
  <path d="M138,150 C150,128 144,104 122,92" fill="none" stroke="#14161c" stroke-width="16" stroke-linecap="round"/>

  <!-- head -->
  <circle cx="100" cy="100" r="34" fill="#faf8f3" stroke="#14161c" stroke-width="3"/>

  <!-- smile -->
  <path d="M88,116 Q100,124 112,116" fill="none" stroke="#14161c" stroke-width="3" stroke-linecap="round"/>

  <!-- binoculars (drawn over eye area) -->
  <g>
    <rect x="92" y="86" width="16" height="8" rx="3" fill="#14161c"/>
    <circle cx="80" cy="92" r="16" fill="#14161c" stroke="#c8852a" stroke-width="3"/>
    <circle cx="120" cy="92" r="16" fill="#14161c" stroke="#c8852a" stroke-width="3"/>
  </g>

  <!-- fedora, tilted for a bit of personality -->
  <g transform="rotate(-9 100 58)">
    <rect x="74" y="34" width="52" height="34" rx="15" fill="#14161c"/>
    <ellipse cx="100" cy="62" rx="46" ry="9" fill="#14161c"/>
    <rect x="74" y="54" width="52" height="7" fill="#c8852a"/>
  </g>
</svg>
