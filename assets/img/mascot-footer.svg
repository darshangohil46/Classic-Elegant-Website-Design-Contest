<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" role="img" aria-label="Cartoon spy mascot tipping his hat">
  <title>chess-intelligence mascot — sign off</title>

  <!-- shoulders -->
  <path d="M30,140 C30,104 46,90 70,90 C94,90 110,104 110,140 Z" fill="#faf8f3"/>
  <circle cx="70" cy="116" r="4" fill="#c8852a"/>

  <!-- arm tipping the hat -->
  <path d="M92,108 C104,96 104,80 92,70" fill="none" stroke="#faf8f3" stroke-width="13" stroke-linecap="round"/>

  <!-- head -->
  <circle cx="70" cy="66" r="28" fill="#faf8f3"/>
  <circle cx="62" cy="66" r="3" fill="#14161c"/>
  <path d="M58,78 Q70,86 80,76" fill="none" stroke="#1f2129" stroke-width="2.5" stroke-linecap="round"/>

  <!-- fedora, lifted slightly off the head -->
  <g transform="translate(2,-6) rotate(-10 70 30)">
    <rect x="46" y="12" width="46" height="28" rx="12" fill="#faf8f3"/>
    <ellipse cx="69" cy="36" rx="40" ry="7.5" fill="#faf8f3"/>
    <rect x="46" y="29" width="46" height="6" fill="#c8852a"/>
  </g>
</svg>
