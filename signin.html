<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — chess-intelligence</title>
    <meta name="description" content="Sign in to your chess-intelligence account to access your saved dossiers and search history." />
    <meta name="robots" content="noindex" /><!-- Sign-in page does not need to be indexed -->

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon-180.png" />

    <!-- ── Google Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Stylesheets ── -->
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/signin.css" />
  </head>

  <body class="signin-page">

    <a class="visually-hidden" href="#main">Skip to content</a>

    <!-- ── Minimal header — brand only, no nav distraction ── -->
    <header class="signin-header">
      <div class="wrap signin-header__row">
        <a href="index.html" class="wordmark-lockup" aria-label="chess-intelligence home">
          <img class="wordmark-lockup__mark" src="assets/favicon/favicon.svg" alt="" aria-hidden="true" width="28" height="28" />
          <span class="wordmark wordmark--sm">
            <span class="wordmark__chess">chess</span><span class="wordmark__dash">-</span><span class="wordmark__intel">intelligence</span>
          </span>
        </a>
        <!-- No nav on sign-in page — reduces distraction, improves conversion focus -->
      </div>
    </header>

    <main id="main" class="signin-main">

      <!-- ================================================================
           SIGN-IN CARD
           Centered, single-column form. Spy-tone microcopy sets the brand
           voice without interfering with the form's usability.
           ================================================================ -->
      <div class="signin-card">

        <!-- Mascot peeks over the top of the card -->
        <img
          class="signin-card__mascot"
          src="assets/img/mascot-hero.svg"
          alt=""
          aria-hidden="true"
        />

        <!-- Card heading -->
        <div class="signin-card__header">
          <h1 class="signin-card__heading">Welcome back, agent.</h1>
          <p class="signin-card__sub">Your dossier awaits.</p>
        </div>

        <!-- Sign-in form — static placeholder; no backend connected -->
        <form class="signin-form" action="#" method="post" novalidate>

          <!-- Email field -->
          <div class="form-field">
            <label class="form-field__label" for="signin-email">Email</label>
            <input
              class="form-field__input"
              id="signin-email"
              type="email"
              name="email"
              placeholder="agent@example.com"
              autocomplete="email"
              required
            />
          </div>

          <!-- Password field -->
          <div class="form-field">
            <div class="form-field__label-row">
              <label class="form-field__label" for="signin-password">Password</label>
              <!-- Forgot password link — right-aligned in the label row -->
              <a href="#" class="form-field__forgot">Forgot password?</a>
            </div>
            <div class="form-field__password-wrap">
              <input
                class="form-field__input"
                id="signin-password"
                type="password"
                name="password"
                placeholder="••••••••••"
                autocomplete="current-password"
                required
              />
              <!-- Toggle button: show/hide password (visual only — no JS) -->
              <button
                type="button"
                class="form-field__toggle"
                aria-label="Show password"
                tabindex="-1"
              >
                <!-- Eye icon -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" stroke="currentColor" stroke-width="2"/>
                  <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Submit button — primary amber CTA -->
          <button type="submit" class="btn btn-primary signin-form__submit">
            Sign in
          </button>

        </form>

        <!-- Divider -->
        <div class="signin-divider" role="presentation">
          <span>New to chess-intelligence?</span>
        </div>

        <!-- Registration link -->
        <a href="#" class="btn btn-ghost signin-card__register">
          Create a free account
        </a>

        <!-- Trust line -->
        <p class="signin-card__trust">
          No credit card required. Basic search is always free.
        </p>

      </div><!-- /signin-card -->

      <!-- Decorative chessboard pattern tile (background texture) -->
      <div class="signin-bg-tile" aria-hidden="true"></div>

    </main>

    <!-- ── Minimal footer — legal links only ── -->
    <footer class="signin-footer">
      <div class="wrap signin-footer__row">
        <p class="signin-footer__copy">
          &copy; chess-intelligence
        </p>
        <nav class="signin-footer__links" aria-label="Legal">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Contact</a>
        </nav>
      </div>
    </footer>

  </body>
</html>
